<div class="tool-container">
  <div class="text-container">
    <h4>{{ item?.Desc }}</h4>
    <h4>{{ item?.Percent + "%" }}</h4>
  </div>
  <div class="progress">
    <div
      class="progress-bar"
      role="progressbar"
      [ngStyle]="{
        width: item?.Percent + '%',
        'background-color': getColor(item?.Percent ?? 0),
      }"
      aria-valuenow="100"
      aria-valuemin="0"
      aria-valuemax="100"
    ></div>
  </div>
</div>
